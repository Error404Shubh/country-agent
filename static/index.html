<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #09090b;
  --bg1:      #111113;
  --bg2:      #18181b;
  --bg3:      #222226;
  --line:     #27272a;
  --line2:    #3f3f46;
  --text:     #fafafa;
  --text2:    #a1a1aa;
  --text3:    #52525b;
  --amber:    #f59e0b;
  --amber-d:  #92400e;
  --green:    #22c55e;
  --green-bg: rgba(34,197,94,0.08);
  --red:      #ef4444;
  --red-bg:   rgba(239,68,68,0.08);
  --blue:     #3b82f6;
  --r:        6px;
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: grid;
  grid-template-rows: 48px 1fr;
  height: 100vh;
}

/* ── Topbar ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid var(--line);
  background: var(--bg1);
  gap: 16px;
}

.tb-left { display: flex; align-items: center; gap: 16px; }

.logo {
  display: flex; align-items: center; gap: 7px;
  font-size: 13px; font-weight: 600;
  color: var(--text); letter-spacing: -0.01em;
}

.logo-dot {
  width: 18px; height: 18px;
  background: var(--amber);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
}

.divider-v {
  width: 1px; height: 16px;
  background: var(--line2);
}

.breadcrumb {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
}

.breadcrumb span { color: var(--text2); }

.tb-right { display: flex; align-items: center; gap: 10px; }

.badge {
  display: flex; align-items: center; gap: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--text3);
  border: 1px solid var(--line2);
  padding: 3px 8px; border-radius: 4px;
  background: var(--bg2);
  letter-spacing: 0.02em;
}

.online-dot {
  width: 5px; height: 5px;
  background: var(--green);
  border-radius: 50%;
  box-shadow: 0 0 5px var(--green);
}

/* ── Main layout ── */
.workspace {
  display: grid;
  grid-template-columns: 340px 1fr;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg1);
}

.sidebar-section {
  padding: 16px;
  border-bottom: 1px solid var(--line);
}

.section-label {
  font-size: 10px;
  font-weight: 500;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 10px;
  font-family: 'JetBrains Mono', monospace;
}

/* Input */
.input-box {
  background: var(--bg);
  border: 1px solid var(--line2);
  border-radius: var(--r);
  overflow: hidden;
  transition: border-color 0.15s;
}
.input-box:focus-within { border-color: var(--amber); }

#question {
  width: 100%;
  padding: 10px 12px;
  background: none;
  border: none;
  outline: none;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  color: var(--text);
  resize: none;
  line-height: 1.55;
  min-height: 72px;
}
#question::placeholder { color: var(--text3); }

.input-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 10px;
  border-top: 1px solid var(--line);
}

.kbd {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  border: 1px solid var(--line2);
  padding: 2px 5px;
  border-radius: 3px;
  background: var(--bg2);
}

.run-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px;
  background: var(--amber);
  color: #000;
  border: none; border-radius: 4px;
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.01em;
}
.run-btn:hover { opacity: 0.88; }
.run-btn:active { transform: scale(0.97); }
.run-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* Examples */
.examples-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.ex-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 9px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text2);
  transition: background 0.1s, color 0.1s;
  border: none; background: none; text-align: left;
  width: 100%;
}
.ex-item:hover { background: var(--bg2); color: var(--text); }

.ex-flag { font-size: 14px; flex-shrink: 0; }
.ex-text { font-size: 12px; }

/* Pipeline trace */
.pipeline {
  padding: 14px 16px;
  border-bottom: 1px solid var(--line);
}

.pipe-row {
  display: flex;
  align-items: center;
  gap: 0;
}

.pipe-node {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}

.pipe-icon {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 1.5px solid var(--line2);
  background: var(--bg2);
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  transition: all 0.25s;
}

.pipe-icon.running {
  border-color: var(--amber);
  color: var(--amber);
  box-shadow: 0 0 0 3px rgba(245,158,11,0.15);
  animation: pulse 1s ease-in-out infinite;
}

.pipe-icon.ok {
  border-color: var(--green);
  color: var(--green);
  background: var(--green-bg);
}

.pipe-icon.err {
  border-color: var(--red);
  color: var(--red);
  background: var(--red-bg);
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 3px rgba(245,158,11,0.15); }
  50%       { box-shadow: 0 0 0 6px rgba(245,158,11,0.05); }
}

.pipe-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 0.04em;
  text-align: center;
}

.pipe-label.running { color: var(--amber); }
.pipe-label.ok      { color: var(--green); }
.pipe-label.err     { color: var(--red); }

.pipe-edge {
  flex: 0 0 24px;
  height: 1px;
  background: var(--line2);
  margin-bottom: 18px;
  transition: background 0.3s;
}
.pipe-edge.ok { background: var(--green); }

/* Stats */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.stat-box {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: 5px;
  padding: 10px 12px;
}

.stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 2px;
}

.stat-label {
  font-size: 10px;
  color: var(--text3);
  font-weight: 400;
}

/* Sidebar bottom */
.sidebar-bottom {
  margin-top: auto;
  padding: 12px 16px;
  border-top: 1px solid var(--line);
}

.api-info {
  display: flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text3);
}

.api-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
}

/* ── Right panel ── */
.panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 40px;
  border-bottom: 1px solid var(--line);
  background: var(--bg1);
  flex-shrink: 0;
}

.panel-title {
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.panel-actions {
  display: flex; align-items: center; gap: 8px;
}

.icon-btn {
  padding: 4px 8px;
  background: none;
  border: 1px solid var(--line2);
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  cursor: pointer;
  transition: all 0.15s;
}
.icon-btn:hover { border-color: var(--line2); color: var(--text2); background: var(--bg2); }

/* Output area */
.output {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.output::-webkit-scrollbar { width: 4px; }
.output::-webkit-scrollbar-track { background: transparent; }
.output::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 2px; }

/* Empty */
.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 8px;
  color: var(--text3);
  user-select: none;
  padding: 40px;
  text-align: center;
}

.empty-icon {
  font-size: 28px;
  opacity: 0.3;
  margin-bottom: 4px;
}

.empty-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
}

.empty-sub {
  font-size: 12px;
  line-height: 1.6;
  max-width: 280px;
}

/* Result card */
.result {
  border: 1px solid var(--line2);
  border-radius: var(--r);
  overflow: hidden;
  animation: slideIn 0.2s ease;
  background: var(--bg1);
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.result-query {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  background: var(--bg2);
  font-size: 11px;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
}

.result-query-icon { opacity: 0.5; }

.result-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
}

.result-flag { font-size: 1.6rem; line-height: 1; }

.result-country-info {}

.result-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
}

.result-official {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  margin-top: 1px;
}

.result-body {
  padding: 14px;
  font-size: 13px;
  line-height: 1.7;
  color: var(--text2);
  font-weight: 400;
  white-space: pre-wrap;
}

.result-body.err {
  color: var(--red);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}

.result-footer {
  display: flex; align-items: center;
  flex-wrap: wrap; gap: 5px;
  padding: 10px 14px;
  border-top: 1px solid var(--line);
  background: var(--bg2);
}

.tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 3px;
  border: 1px solid rgba(245,158,11,0.2);
  background: rgba(245,158,11,0.06);
  color: var(--amber);
  letter-spacing: 0.02em;
}

/* Loading card */
.loading-card {
  border: 1px solid var(--line2);
  border-radius: var(--r);
  padding: 16px;
  background: var(--bg1);
  display: flex; align-items: center; gap: 12px;
  font-size: 12px;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
}

.spin {
  width: 14px; height: 14px;
  border: 1.5px solid var(--line2);
  border-top-color: var(--amber);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  flex-shrink: 0;
}

@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 700px) {
  .workspace { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
  .sidebar { border-right: none; border-bottom: 1px solid var(--line); max-height: 55vh; }
  html, body { overflow: auto; }
}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="tb-left">
    <div class="logo">
      <div class="logo-dot">🌐</div>
      Atlas
    </div>
    <div class="divider-v"></div>
    <div class="breadcrumb">
      agents / <span>country-intel</span>
    </div>
  </div>
  <div class="tb-right">
    <div class="badge">
      <div class="online-dot"></div>
      kimi-k2.6 · nim
    </div>
    <a href="/docs" style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);text-decoration:none;border:1px solid var(--line2);padding:3px 8px;border-radius:4px;background:var(--bg2);" target="_blank">API</a>
  </div>
</div>

<!-- Workspace -->
<div class="workspace">

  <!-- Sidebar -->
  <div class="sidebar">

    <!-- Input -->
    <div class="sidebar-section">
      <div class="section-label">Query</div>
      <div class="input-box">
        <textarea id="question" rows="3"
          placeholder="What is the population of Germany?"></textarea>
        <div class="input-footer">
          <span class="kbd">↵ run</span>
          <button class="run-btn" id="runBtn" onclick="run()">
            ▶ Run
          </button>
        </div>
      </div>
    </div>

    <!-- Examples -->
    <div class="sidebar-section">
      <div class="section-label">Examples</div>
      <div class="examples-list">
        <button class="ex-item" onclick="fill('What is the population of Germany?')">
          <span class="ex-flag">🇩🇪</span>
          <span class="ex-text">Population of Germany</span>
        </button>
        <button class="ex-item" onclick="fill('What currency does Japan use?')">
          <span class="ex-flag">🇯🇵</span>
          <span class="ex-text">Currency of Japan</span>
        </button>
        <button class="ex-item" onclick="fill('What is the capital and area of Brazil?')">
          <span class="ex-flag">🇧🇷</span>
          <span class="ex-text">Capital & area of Brazil</span>
        </button>
        <button class="ex-item" onclick="fill('What languages are spoken in Switzerland?')">
          <span class="ex-flag">🇨🇭</span>
          <span class="ex-text">Languages in Switzerland</span>
        </button>
        <button class="ex-item" onclick="fill('Is Mongolia landlocked?')">
          <span class="ex-flag">🇲🇳</span>
          <span class="ex-text">Is Mongolia landlocked?</span>
        </button>
        <button class="ex-item" onclick="fill('What timezone is Iceland in?')">
          <span class="ex-flag">🇮🇸</span>
          <span class="ex-text">Timezone of Iceland</span>
        </button>
      </div>
    </div>

    <!-- Pipeline -->
    <div class="pipeline">
      <div class="section-label">Agent pipeline</div>
      <div class="pipe-row">
        <div class="pipe-node">
          <div class="pipe-icon" id="n1">01</div>
          <div class="pipe-label" id="l1">parse_intent</div>
        </div>
        <div class="pipe-edge" id="e1"></div>
        <div class="pipe-node">
          <div class="pipe-icon" id="n2">02</div>
          <div class="pipe-label" id="l2">fetch_data</div>
        </div>
        <div class="pipe-edge" id="e2"></div>
        <div class="pipe-node">
          <div class="pipe-icon" id="n3">03</div>
          <div class="pipe-label" id="l3">synthesize</div>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="sidebar-section">
      <div class="section-label">Session</div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-value" id="statCount">0</div>
          <div class="stat-label">queries run</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="statAvg">—</div>
          <div class="stat-label">avg latency</div>
        </div>
      </div>
    </div>

    <div class="sidebar-bottom">
      <div class="api-info">
        <div class="api-dot"></div>
        restcountries.com/v3.1
      </div>
    </div>

  </div>

  <!-- Right: output -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">output</span>
      <div class="panel-actions">
        <button class="icon-btn" onclick="clearOutput()">clear</button>
      </div>
    </div>

    <div class="output" id="output">
      <div class="empty" id="emptyState">
        <div class="empty-icon">◈</div>
        <div class="empty-title">No output yet</div>
        <div class="empty-sub">Run a query from the sidebar to see the agent's response here.</div>
      </div>
    </div>
  </div>

</div>

<script>
  const API = '/api/query';
  let queryCount = 0;
  let totalMs = 0;

  function fill(text) {
    document.getElementById('question').value = text;
  }

  document.getElementById('question').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); run(); }
  });

  // Pipeline animation
  const nodes = ['n1','n2','n3'];
  const labels = ['l1','l2','l3'];
  const edges = ['e1','e2'];

  function resetPipe() {
    nodes.forEach(id => { document.getElementById(id).className = 'pipe-icon'; });
    labels.forEach(id => { document.getElementById(id).className = 'pipe-label'; });
    edges.forEach(id => { document.getElementById(id).className = 'pipe-edge'; });
  }

  function setNode(idx, state) { // 0-based
    document.getElementById(nodes[idx]).className = `pipe-icon ${state}`;
    document.getElementById(labels[idx]).className = `pipe-label ${state}`;
  }

  function setEdge(idx, ok) {
    document.getElementById(edges[idx]).className = `pipe-edge${ok ? ' ok' : ''}`;
  }

  const delay = ms => new Promise(r => setTimeout(r, ms));

  async function animatePipeline(hadError) {
    resetPipe();
    setNode(0, 'running'); await delay(650);
    setNode(0, hadError ? 'err' : 'ok');
    if (!hadError) {
      setEdge(0, true); setNode(1, 'running'); await delay(800);
      setNode(1, 'ok');
      setEdge(1, true); setNode(2, 'running'); await delay(450);
      setNode(2, 'ok');
    }
  }

  function clearOutput() {
    document.getElementById('output').innerHTML = `
      <div class="empty" id="emptyState">
        <div class="empty-icon">◈</div>
        <div class="empty-title">No output yet</div>
        <div class="empty-sub">Run a query from the sidebar to see the agent's response here.</div>
      </div>`;
    resetPipe();
  }

  async function run() {
    const q = document.getElementById('question').value.trim();
    if (!q) return;

    const btn = document.getElementById('runBtn');
    const output = document.getElementById('output');
    btn.disabled = true;

    // Remove empty state
    document.getElementById('emptyState')?.remove();

    // Loading card
    const loader = document.createElement('div');
    loader.className = 'loading-card';
    loader.id = 'loader';
    loader.innerHTML = `<div class="spin"></div><span>Running agent…</span>`;
    output.appendChild(loader);
    loader.scrollIntoView({ behavior: 'smooth' });

    const traceP = animatePipeline(false); // optimistic; corrected below
    const t0 = Date.now();

    let data = null, isErr = false;

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q }),
      });
      data = await res.json();
      if (!res.ok) isErr = true;
    } catch {
      isErr = true;
      data = { answer: 'Network error — is the server running?' };
    }

    const elapsed = Date.now() - t0;
    await traceP;
    if (isErr) { resetPipe(); setNode(0, 'err'); }

    document.getElementById('loader')?.remove();

    // Stats
    queryCount++;
    totalMs += elapsed;
    document.getElementById('statCount').textContent = queryCount;
    document.getElementById('statAvg').textContent = Math.round(totalMs / queryCount) + 'ms';

    // Build result card
    const card = document.createElement('div');
    card.className = 'result';

    const flag    = data.raw_data?.flag || '';
    const name    = data.country || '';
    const official = data.raw_data?.official_name || '';
    const fields  = data.fields_retrieved || [];
    const answer  = data.answer || data.detail || 'Unknown error.';

    let html = `
      <div class="result-query">
        <span class="result-query-icon">›</span>
        ${q}
      </div>`;

    if (!isErr && name) {
      html += `
        <div class="result-header">
          <span class="result-flag">${flag}</span>
          <div class="result-country-info">
            <div class="result-name">${name}</div>
            ${official && official !== name
              ? `<div class="result-official">${official}</div>` : ''}
          </div>
        </div>`;
    }

    html += `<div class="result-body${isErr ? ' err' : ''}">${answer}</div>`;

    if (fields.length) {
      html += `<div class="result-footer">${
        fields.map(f => `<span class="tag">${f.replace(/_/g,' ')}</span>`).join('')
      }</div>`;
    }

    card.innerHTML = html;
    output.appendChild(card);
    card.scrollIntoView({ behavior: 'smooth' });

    btn.disabled = false;
  }
</script>
</body>
</html>
